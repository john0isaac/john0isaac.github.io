# Project information .........................................
site_name: "John Aziz"
site_url: https://johnaziz.org
site_description: >
  John Aziz — Senior AI Software Engineer and Microsoft MVP. Building production-grade AI systems, open-source projects, and cloud-native architectures on Azure.

# Copyright ...................................................
copyright: >
  &copy; 2026 John Aziz

# Repository ..................................................
repo_url: https://github.com/john0isaac
repo_name: john0isaac

# Configuration ...............................................
docs_dir: src
theme:
  name: material
  custom_dir: src/overrides
  icon:
    admonition:
      note: fontawesome/solid/note-sticky
      info: fontawesome/solid/circle-info
      tip: fontawesome/solid/bullhorn
      success: fontawesome/solid/check
      question: fontawesome/solid/circle-question
      warning: fontawesome/solid/triangle-exclamation
      example: fontawesome/solid/flask
      quote: fontawesome/solid/quote-left
  font:
    code: Roboto Mono #Monospaced
    text: Roboto #Regular
  logo: images/favicon.svg
  favicon: images/favicon.svg
  language: en

  # Theme Modes ...............................................
  palette:
    - scheme: default
      primary: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  # Theme Features ...............................................
  features:
    # - navigation.instant
    # - navigation.expand             # sidebar collapsible sections open
    # - navigation.instant.progress   # load progress indicator
    # - navigation.tracking           # tracks anchor tags in URL
    - navigation.tabs # tabbed on desktop, single in mobile
    - navigation.tabs.sticky # tabs stick when scrolling downtheme:
    # - navigation.path               # add breadcrumbs
    # - navigation.indexes            # default index.md in folder is section page
    # - navigation.top
    # - toc.follow
    - navigation.footer
    - content.code.copy # allow copy-paste from codeblocks
    # - content.tabs.link             # Ensures site-wide switch to same tab name
    - search.suggest
    - search.share # share search results via URL

# Extra ...............................................
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/john0isaac
      name: John Aziz on GitHub
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/john0isaac
      name: John Aziz on LinkedIn
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@john0isaac
      name: John Aziz on YouTube
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/john00isaac
      name: John Aziz on X
  meta:
    - name: author
      content: John Aziz
    - name: robots
      content: index, follow

# Navigation  ...............................................
nav:
  - Home: index.md
  - Blog:
      - blog/index.md
  - Projects: projects.md
  - Talks: talks.md

# Extensions  ...............................................
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - toc:
      toc_depth: 3

# Hooks ................................................
hooks:
  - hooks/data_loader.py

# Plugins ...............................................
plugins:
  - search
  - meta
  - privacy
  - macros:
      module_name: main
      render_by_default: false
  - blog:
      post_date_format: full
      post_url_date_format: yyyy/MM/dd
      post_excerpt: required
      archive_date_format: MMMM yyyy
      archive_url_date_format: yyyy/MM
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags
