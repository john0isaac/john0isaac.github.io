<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (() => {
        // Disable browser's built-in scroll restoration (it jitters due to fixed
        // navbar + font layout shifts). We handle it manually below instead.
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

        const storedTheme = localStorage.getItem('theme');
        const preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const theme = storedTheme || preferredTheme;

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;

        // Save scroll position per URL before the page unloads.
        window.addEventListener('pagehide', () => {
          sessionStorage.setItem('scrollY:' + location.pathname, String(window.scrollY));
        });

        // Restore after fonts are ready so layout shifts don't throw it off.
        document.fonts.ready.then(() => {
          const saved = sessionStorage.getItem('scrollY:' + location.pathname);
          if (saved !== null) {
            window.scrollTo({ top: parseInt(saved, 10), behavior: 'instant' });
          }
        });
      })();
    </script>
    <title>{% if page.title and page.title != site_name %}{{ page.title }} | {% endif %}{{ site_name }}</title>
    <meta name="description" content="{{ page.description }}" />
    <link rel="canonical" href="{{ page.absolute_url }}" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ page.title }}" />
    <meta property="og:description" content="{{ page.description }}" />
    <meta property="og:url" content="{{ page.absolute_url }}" />
    <meta property="og:site_name" content="{{ site_name }}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ page.title }}" />
    <meta name="twitter:description" content="{{ page.description }}" />
    {% if page.social_card_url %}
    <meta property="og:image" content="{{ site_url }}{{ page.social_card_url }}" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:image" content="{{ site_url }}{{ page.social_card_url }}" />
    {% endif %}
    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/logo/favicon-16x16.png" />
    <link rel="shortcut icon" href="/images/logo/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/logo/apple-touch-icon.png" />
    <link rel="manifest" href="/images/logo/site.webmanifest" />
    <link rel="stylesheet" href="/vendor/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <script defer src="/assets/js/codeblocks.js"></script>
    <script defer src="/assets/js/search.js"></script>
    <script defer src="/assets/js/blog-archive.js"></script>
    <script defer src="/assets/js/theme.js"></script>
    <script defer src="/assets/js/nav-drawer.js"></script>
    <script defer src="/vendor/bootstrap/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    {% include "partials/navbar.html" %}
    {% include "partials/search_modal.html" %}

    <main class="shell main-content">{% block content %}{% endblock %}</main>

    {% include "partials/footer.html" %}
  </body>
</html>
