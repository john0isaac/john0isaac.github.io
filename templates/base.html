<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (() => {
        const storedTheme = localStorage.getItem('theme');
        const preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const theme = storedTheme || preferredTheme;

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <title>{% if page.title and page.title != site_name %}{{ page.title }} | {% endif %}{{ site_name }}</title>
    <meta name="description" content="{{ page.description }}" />
    <link rel="canonical" href="{{ page.absolute_url }}" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ page.title }}" />
    <meta property="og:description" content="{{ page.description }}" />
    <meta property="og:url" content="{{ page.absolute_url }}" />
    <meta property="og:site_name" content="{{ site_name }}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ page.title }}" />
    <meta name="twitter:description" content="{{ page.description }}" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/logo/favicon-16x16.png" />
    <link rel="shortcut icon" href="/images/logo/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/logo/apple-touch-icon.png" />
    <link rel="manifest" href="/images/logo/site.webmanifest" />
    <link rel="stylesheet" href="/vendor/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <script defer src="/assets/codeblocks.js"></script>
    <script defer src="/assets/search.js"></script>
    <script defer src="/assets/blog-archive.js"></script>
    <script defer src="/assets/theme.js"></script>
    <script defer src="/vendor/bootstrap/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    {% include "partials/navbar.html" %}
    {% include "partials/search_modal.html" %}

    <main class="shell main-content">{% block content %}{% endblock %}</main>

    {% include "partials/footer.html" %}
  </body>
</html>
