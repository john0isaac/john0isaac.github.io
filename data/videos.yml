- id: mgCkmYhV5UU
  title: Career Information Session for Egyptian Students
  description: "Visit Microsoft Learn: https://aka.ms/MSLearnMay7 \nVisit Microsoft\
    \ Reactor website to check out our upcoming events: https://aka.ms/ReactorMay7\n\
    \nAre you passionate about technology and want to learn new skills, get certified,\
    \ access cloud resources, join a global community and compete in a world-class\
    \ competition? If yes, then you don't want to miss this amazing opportunity!\n\
    \nMicrosoft is hosting a Career Information Session for Egyptian Students on May\
    \ 7th, 2023 at 2:00 PM Cairo time. This session will introduce you to the FREE\
    \ offers that Microsoft has for students like you, such as:\n\nMicrosoft Learn\
    \ Student Ambassador Program\nA program that empowers students to learn, lead\
    \ and share their passion for technology with others. As a student ambassador,\
    \ you will get access to exclusive benefits such as mentorship, training, certification\
    \ vouchers, swag and more. You will also have the chance to network with other\
    \ student ambassadors from around the world and showcase your projects and achievements\
    \ on a global platform.\n\n**FREE Certification**\n\nA certification is a great\
    \ way to validate your skills and knowledge in a specific technology area. Microsoft\
    \ offers a variety of certifications for different levels and roles, such as Azure\
    \ Fundamentals, Data Analyst Associate, AI Engineer Associate and more. As a student,\
    \ you can get one free certification voucher per year through Microsoft Learn.\n\
    \n**Azure for Student Offer**\n\nA offer that gives you $100 credit to use on\
    \ Azure services for 12 months. You can use this credit to explore and experiment\
    \ with cloud computing, artificial intelligence, machine learning, data science\
    \ and more. You will also get free access to popular tools and software such as\
    \ Visual Studio Code, GitHub and SQL Server.\n\n**GitHub Student Developer Pack**\n\
    \nA pack that gives you free access to over 200 tools and services from GitHub\
    \ and its partners. You can use this pack to build your portfolio, collaborate\
    \ with other developers, deploy your code to the cloud and more. Some of the tools\
    \ included are GitHub Pro account (unlimited private repositories), GitHub Pages\
    \ (hosting), GitHub Actions (automation), Heroku (cloud platform), MongoDB Atlas\
    \ (database) and many more.\n\n**Microsoft Learn Hub**\n\nA hub that provides\
    \ you with free online courses on various topics related to Microsoft technologies.\
    \ You can learn at your own pace through interactive modules that include videos,\
    \ quizzes and hands-on labs. You can also earn badges and points as you complete\
    \ each course.\n\n**Microsoft Imagine Cup**\n\nA competition that challenges students\
    \ to use their creativity and technical skills to solve real-world problems using\
    \ Microsoft technologies. You can work individually or in teams of up to four\
    \ members. The competition has four categories: Earth (environmental issues),\
    \ Education (learning solutions), Health (healthcare solutions) and Lifestyle\
    \ (social impact solutions). The winners of each category will receive cash prizes\
    \ ($10K for first place) , mentorship from Microsoft experts , travel expenses\
    \ paid trip to Seattle , USA ,and a chance to compete in the World Finals.\n\n\
    If you are interested in any or all of these offers , then register now for the\
    \ Career Information Session for Egyptian Students. Don't miss this chance to\
    \ boost your career prospects , enhance your skills ,and have fun with technology!\n\
    \n[Azure for Student Activation](https://azure.microsoft.com/en-us/free/students/?WT.mc_id=academic-91994-ooyinbooke?wt.mc_id=1reg_19095_webpage_reactor)\n\
    \n[Student Ambassadors Program](https://studentambassadors.microsoft.com/?WT.mc_id=academic-91996-ooyinbooke?wt.mc_id=1reg_19095_webpage_reactor)\n\
    \n[Student Certification](https://learn.microsoft.com/en-gb/training/student-hub/certifications?WT.mc_id=academic-92000-ooyinbooke?wt.mc_id=1reg_19095_webpage_reactor)\n\
    \n[Sign Up for GitHub Student Pack](https://education.github.com/pack?WT.mc_id=academic-92001-ooyinbooke?wt.mc_id=1reg_19095_webpage_reactor)\n\
    \n[eventID:19095]"
