- id: DnvmVRFffMY
  title: Building RAG apps with Azure Cosmos DB for MongoDB
  description: "RAG (Retrieval Augmented Generation) is the most common approach used\
    \ to get LLMs to answer questions grounded in a particular domain's data.  Learn\
    \ how to build a RAG app using vCore-based Azure Cosmos DB for MongoDB and its\
    \ new vector search capabilities. We'll walk through a Python web app that uses\
    \ the LangChain package to orchestrate a RAG flow in order to answer questions\
    \ about a restaurant's data.\n\nPresented by Khelan Modi, Product Manager on Azure\
    \ Cosmos DB team, and John Aziz, Software Developer and Microsoft MVP\n\n** Part\
    \ of RAGHack, a free global hackathon to develop RAG applications. Join at https://aka.ms/raghack\
    \ ** \n\n\U0001F4CC Check out the RAGHack 2024 series here! https://aka.ms/RAGHack2024\n\
    \n#MicrosoftReactor #RAGHack #AzureCosmosDB\n\nDocs and more links:\nAzure Cosmos\
    \ DB for MongoDB vCore Free tier - https://aka.ms/tryvcore\u200B\u200B\nDemo code\
    \ - https://aka.ms/vcorelangchain\u200B\u200B\n\u200B\u200BAdditional samples,\
    \ docs and more - https://aka.ms/CosmosAISamples\nTry Azure Cosmos DB for Free,\
    \ no credit card required - https://aka.ms/trycosmosdb\n\n[eventID:23329]"
  published: '2024-09-26'
  thumbnail: https://img.youtube.com/vi/DnvmVRFffMY/mqdefault.jpg
  views: 739
- id: XHJj_M84X28
  title: RAG using Semantic Kernel with Azure OpenAI and Azure Cosmos DB for MongoDB
    vCore - April 2024
  description: "Learn about the new capabilities of Azure Cosmos DB for MongoDB vCore\
    \ and Semantic Kernel that enable you to use vector search and integrate your\
    \ AI-based movie recommendation applications. Vector search enables you to efficiently\
    \ store, index, and query high-dimensional vector data along with operational\
    \ data that is stored directly in Cosmos DB for MongoDB vCore. Semantic Kernel\
    \ enables integration with Azure OpenAI to perform retrieval augmented generation\
    \ (RAG) and bring everything together.\r\n\r\nIn this session, you'll learn about\
    \ vector search, RAG, and the steps you need to perform to enable it using the\
    \ semantic kernel, discover how to set up an Azure Cosmos DB for MongoDB vCore,\
    \ deploy the Azure OpenAI chat and embedding model, learn about how the semantic\
    \ kernel works, and integrate it in a quart app.\r\n\r\nJoin us in building a\
    \ Flask application capable of generating responses using vector search and RAG,\
    \ catering to tech enthusiasts of all expertise levels.\r\n\r\n#azurecosmosdb\
    \ #ai #azureopenai\r\n\r\nUseful links:\r\n\u2022 (GitHub) RAG using Semantic\
    \ Kernel with Azure OpenAI and Azure Cosmos DB for MongoDB vCore - https://github.com/john0isaac/rag-semantic-kernel-mongodb-vcore\r\
    \n\u2022 Azure OpenAI Service documentation\r\n - https://learn.microsoft.com/azure/ai-services/openai\r\
    \n\u2022 Azure Cosmos DB for MongoDB vCore documentation\r\n - https://learn.microsoft.com/azure/cosmos-db/mongodb/vcore\r\
    \n\u2022 Semantic Kernel documentation\r\n - https://learn.microsoft.com/semantic-kernel\r\
    \n\u2022 Use vector search on embeddings in Azure Cosmos DB for MongoDB vCore\r\
    \n - https://learn.microsoft.com/azure/cosmos-db/mongodb/vcore/vector-search\r\
    \n\u2022 Semantic Kernel GitHub with Samples and Notebooks - https://github.com/microsoft/semantic-kernel\r\
    \n\u2022 Subscribe to this channel - https://aka.ms/AzureCosmosDBYouTube\r\n\u2022\
    \ Check out past meetups on YouTube to catch anything you might have missed -\
    \ https://www.youtube.com/playlist?list=PLmamF3YkHLoJSJ1qdHDXXSlmkj2HKz-nb\r\n\
    \u2022 Want to present at a future meetup?  Fill out our intake form - https://aka.ms/AzureCosmosDB/UserGroupSubmission\r\
    \n\u2022 Try Azure Cosmos DB Free - https://aka.ms/trycosmosdb\r\n\u2022 Microsoft\
    \ Reactor - https://aka.ms/Reactor\r\n\r\nSpeakers:\r\nKhelan Modi \u2013 Microsoft,\
    \ Product Manager\r\nBio: Khelan Modi, a dynamic Product Manager at the forefront\
    \ of the Azure Cosmos DB team, seamlessly integrates his deep expertise in databases\
    \ with a passion for AI innovation. Focused on the transformative potential of\
    \ vector search, Khelan consistently pioneers modern AI methodologies to enhance\
    \ product functionalities across industries like advertisements and retail.\r\n\
    \r\nJohn Aziz \u2013 GEMINDZ, Software Developer\r\nBio: John is deeply passionate\
    \ about continuously expanding his knowledge in software engineering and developer\
    \ roles, driven by the desire to both learn new technologies and share my insights\
    \ with others. His expertise extends to the realm of Cloud Computing, where he\
    \ has honed his skills and demonstrated my capabilities. Additionally, He possesses\
    \ the Microsoft AI MVP award. He had the privilege of developing official content\
    \ for both the Microsoft Tech Community and Microsoft Learn, contributing to the\
    \ broader knowledge-sharing ecosystem."
