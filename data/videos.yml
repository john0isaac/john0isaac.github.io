- id: k6DZ4xq6ZJM
  title: Microsoft Build After Party - AI on Azure 2023 [Arabic]
  description: "\U0001F9D0 The session will focus on AI and the latest advancements\
    \ achieved thanks to Microsoft and the services provided by Azure AI. We will\
    \ cover various topics, including:\n\U0001F4CCThe general history of AI and its\
    \ evolution to the current stage.\n\U0001F4CCThe history and development of Large\
    \ Language Models (LLMs), which are trained on vast amounts of information in\
    \ various domains and languages.\n\U0001F4CCHow neural networks understand and\
    \ connect language to comprehend sentences, with a deeper dive into recurrent\
    \ neural networks.\n\U0001F4CCExploring Transformer models and discovering the\
    \ latest innovations in this field.\n\U0001F4CCAn engaging discussion about the\
    \ popular GPTs Models that have gained traction recently.\n\U0001F4CCExamining\
    \ the significant collaboration between Open AI and Microsoft, the services they\
    \ offer, and how we can benefit from them.\n\U0001F4CCLearning more about Azure\
    \ and how to utilize it in our own AI projects, including the differences between\
    \ Azure AI and Azure Open AI services.\n\U0001F4CCContinuing with Azure AI to\
    \ explore the best practices for utilization and even trying out a chatbot using\
    \ Azure Open AI in a trial version.\n\U0001F4CCLastly, we will discuss how to\
    \ use AI safely and ethically.\n\n#microsoftbuild2023 #MicrosoftBuild #BeAForceForGood\
    \ #MSFTStudentAmbassadors #microsoftlearnstudentcommunity_eelu #MicrosoftLearn\
    \ #Azure #AI"
